name: 📊 市场情绪看板 — Daily Update

on:
  schedule:
    # 工作日 10:30 UTC = 18:30 CST
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📡 Fetch Market Data
        id: fetch
        run: |
          python scripts/fetch_data.py 2>&1 | tee fetch.log
          # 检查数据是否有效
          if python3 -c "
import json
with open('data/data.json') as f:
    d = json.load(f)
sent = d.get('a_share', {}).get('market_sentiment', {})
up = sent.get('up_count', 0)
down = sent.get('down_count', 0)
print(f'UP={up} DOWN={down}')
if up == 0 and down == 0:
    exit(1)
"; then
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "✅ 数据采集成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ 数据采集失败（up/down 均为 0），跳过本次部署" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8

      - name: 🏗️ Build Static Site
        if: steps.fetch.outputs.status == 'ok'
        run: |
          python scripts/build_site.py

      - name: 📂 Deploy to GitHub Pages
        if: steps.fetch.outputs.status == 'ok'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'market-bot'
          user_email: 'bot@market-sentiment.io'
