name: 📊 市场情绪看板 — Daily Update

on:
  schedule:
    - cron: '30 10 * * 1-5'   # 工作日 18:30 CST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install akshare pandas

      - name: 📡 Fetch & Build
        id: run
        run: |
          # 采集数据
          python scripts/fetch_data.py 2>&1
          EXIT_CODE=$?
          
          # 检查数据有效性
          python3 -c "
import json
try:
    with open('data/data.json') as f:
        d = json.load(f)
    up = d.get('a_share', {}).get('market_sentiment', {}).get('up_count', 0)
    down = d.get('a_share', {}).get('market_sentiment', {}).get('down_count', 0)
    sp = d.get('us_market', {}).get('sp500', {}).get('value', 0)
    print(f'A股:{up}/{down} 标普500:{sp}')
    if up == 0 and down == 0 and sp == 0:
        exit(1)
except:
    exit(1)
" 2>&1 && DATA_OK=true || DATA_OK=false
          
          echo "data_ok=$DATA_OK" >> $GITHUB_OUTPUT
          
          if [ "$DATA_OK" = "true" ]; then
            # 构建站点
            python scripts/build_site.py
            # 部署到根目录
            cp dist/index.html index.html
            cp dist/data.json data.json
            git config user.name 'market-bot'
            git config user.email 'bot@market-sentiment.io'
            git add index.html data.json
            if git diff --cached --quiet; then
              echo "✅ 数据无变化，跳过部署"
            else
              git commit -m "deploy: 每日数据更新 [skip ci]"
              git push
              echo "✅ 已部署更新"
            fi
          else
            echo "⚠️ 数据全部为空，跳过部署（保留上次数据）"
          fi
        env:
          PYTHONIOENCODING: utf-8
